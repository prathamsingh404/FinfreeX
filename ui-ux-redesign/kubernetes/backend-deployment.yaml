apiVersion: apps/v1
kind: Deployment
metadata:
  name: portai-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portai-backend
  template:
    metadata:
      labels:
        app: portai-backend
    spec:
      containers:
      - name: backend
        image: portai-backend:latest
        imagePullPolicy: Never
        env:
        - name: DATABASE_URL
          value: "postgresql://portai_user:portai_password@portai-postgres:5432/portai_db"
        - name: REDIS_URL
          value: "redis://portai-redis:6379/0"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: portai-secrets
              key: openai-api-key
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: portai-backend
spec:
  ports:
  - port: 8000
  selector:
    app: portai-backend
